# TrendRadar 키워드 세트 설정
# 각 세트는 관심 있는 키워드 그룹을 정의합니다.

data_quality:
  priority: P1
  primary_motion: attention
  weakest_dimension: authority
  quality_outputs:
    latest: docs/reports/trend_quality.json
    dated_pattern: docs/reports/trend_YYYYMMDD_quality.json
    tracked_event_models:
      - attention_signal
      - conversion_proxy_signal
      - community_signal
  event_models:
    attention_signal:
      date_fields:
        - signal_date
        - collected_at
      required_fields:
        - keyword_set_name
        - channel
        - raw_value
        - normalized_value
    conversion_proxy_signal:
      date_fields:
        - signal_date
        - collected_at
      required_fields:
        - keyword_set_name
        - proxy_type
        - source
    community_signal:
      date_fields:
        - signal_date
        - collected_at
      required_fields:
        - keyword_set_name
        - community
        - signal_value
  canonical_keys:
    keyword_pack:
      - name
      - version
      - taxonomy.vertical
      - taxonomy.intent
    platform_signal:
      - keyword_set_name
      - channel
      - signal_date
  freshness_sla:
    attention_signal_days: 1
    conversion_proxy_signal_days: 7
    community_signal_days: 3
  signal_layers:
    attention:
      - naver
      - google
      - google_trending
      - wikipedia
      - youtube
    conversion_proxy:
      - naver_shopping
    community:
      - reddit
      - hackernews
      - devto
      - stackexchange
      - producthunt
  score_axes:
    attention:
      description: search, trending, pageview, and content attention score
      output_field: attention_score
    conversion_proxy:
      description: shopping and other downstream behavior proxy score
      output_field: conversion_proxy_score
  normalization:
    policy: normalize each platform to a 0-100 daily scale before cross-platform comparison
    preserve_raw_value: true
    preserve_platform: true
  quality_gates:
    - keyword pack 버전과 생성 기준을 추적
    - 관심 신호와 전환 신호를 같은 점수로 병합하지 않음
    - 플랫폼별 trend scale 차이를 정규화한 뒤 비교
  next_actions:
    - shopping·conversion proxy source를 운영 레이어로 넓힘
    - vertical keyword pack을 표준 파일로 분리하고 버전 관리
    - attention score와 conversion proxy score를 별도 축으로 시각화
  source_backlog:
    - id: product_signup_proxy
      name: Product signup / waitlist proxy
      activation_gate: ToS review and domain-specific entity mapping
    - id: commerce_visit_proxy
      name: Commerce visit / catalog interest proxy
      activation_gate: aggregation policy and privacy review

keyword_sets:
  # 예시 1: 위스키 시장 동향
  - name: "위스키 시장 동향"
    enabled: true
    description: "위스키 관련 검색 트렌드 추적"
    version: "2026.04"
    taxonomy:
      vertical: beverage
      intent: market_attention
    keywords:
      - "위스키"
      - "싱글몰트"
      - "하이볼"
      - "발렌타인"
      - "맥캘란"
    channels:
      - naver
      - google
      - hackernews
      - devto
      - stackexchange
    time_range:
      start: "2024-01-01"
      end: "2025-11-24"
    filters:
      # Naver 필터
      time_unit: date  # date, week, month
      device: ""       # pc, mo, 빈 문자열 = 전체
      gender: ""       # m, f, 빈 문자열 = 전체
      ages: []         # ["1", "2", "3"] = 10대, 20대, 30대, 빈 배열 = 전체
      # Google 필터
      geo: KR          # KR, US, JP 등 ISO 국가 코드, 빈 문자열 = 전세계

  # 예시 2: 부동산 키워드 (활성화)
  - name: "서울 부동산 트렌드"
    enabled: true
    description: "서울 주요 지역 부동산 검색 트렌드"
    version: "2026.04"
    taxonomy:
      vertical: real_estate
      intent: market_attention
    keywords:
      - "강남 아파트"
      - "송파 전세"
      - "마포 매매"
      - "분양권"
      - "서울 부동산"
      - "아파트 매매"
      - "전세 시세"
      - "부동산 시장"
      - "재건축"
      - "청약"
    channels:
      - naver
      - google
    time_range:
      start: "2024-06-01"
      end: "2026-12-31"
    filters:
      time_unit: week
      device: ""
      gender: ""
      ages: ["3", "4"]  # 30대, 40대
      geo: KR

  # 예시 3: 와인 트렌드
  - name: "와인 시장 동향"
    enabled: true
    description: "와인 관련 검색 트렌드"
    version: "2026.04"
    taxonomy:
      vertical: beverage
      intent: market_attention
    keywords:
      - "와인"
      - "레드와인"
      - "화이트와인"
      - "샴페인"
    channels:
      - naver
      - google
    time_range:
      start: "2024-01-01"
      end: "2025-11-24"
    filters:
      time_unit: date
      device: ""
      gender: ""
      ages: []
      geo: KR

  # 예시 4: K-POP 트렌드 (YouTube + 검색)
  - name: "K-POP 트렌드"
    enabled: true
    description: "K-POP 아이돌 및 음악 트렌드 추적"
    version: "2026.04"
    taxonomy:
      vertical: entertainment
      intent: fan_attention
    keywords:
      - "케이팝"
      - "K-POP"
      - "아이돌"
      - "걸그룹"
      - "보이그룹"
      - "뉴진스"
      - "에스파"
      - "블랙핑크"
      - "BTS"
      - "음원차트"
      - "멜론"
      - "음악방송"
    channels:
      - naver
      - google
      - youtube
    time_range:
      start: "2024-01-01"
      end: "2026-12-31"
    filters:
      time_unit: date
      geo: KR
      # YouTube 전용 필터
      youtube_category: "10"  # 10=Music
      youtube_max_results: 50

  # 예시 5: 커뮤니티 트렌드 (Reddit)
  - name: "글로벌 테크 커뮤니티 트렌드"
    enabled: true
    description: "Reddit 기술 커뮤니티 트렌드"
    version: "2026.04"
    taxonomy:
      vertical: technology
      intent: community_attention
    keywords:
      - "AI"
      - "machine learning"
      - "Python"
      - "programming"
      - "tech news"
      - "software development"
      - "cloud computing"
      - "open source"
    channels:
      - reddit
      - hackernews
      - devto
    reddit_subreddits:
      - "python"
      - "programming"
      - "learnpython"
      - "technology"
      - "machinelearning"
      - "artificial"
    reddit_sort: "hot"  # hot, new, top, rising, controversial
    reddit_time_filter: "day"  # hour, day, week, month, year, all
    reddit_limit: 25

  # 예시 6: 쇼핑 트렌드 (네이버 쇼핑)
  - name: "패션 쇼핑 트렌드"
    enabled: true
    description: "네이버 쇼핑 패션 카테고리 트렌드"
    version: "2026.04"
    taxonomy:
      vertical: commerce_fashion
      intent: conversion_proxy
    keywords:
      - "패션"
      - "의류"
      - "쇼핑"
      - "코디"
      - "브랜드"
      - "화장품"
      - "스킨케어"
      - "메이크업"
    channels:
      - naver_shopping
      - naver
    time_range:
      start: "2024-10-01"
      end: "2026-12-31"
    filters:
      time_unit: week
      device: "mo"  # 모바일
      gender: "f"   # 여성
      ages: ["2", "3"]  # 20대, 30대
    naver_shopping_categories:
      - "50000000"  # 패션의류
      - "50000001"  # 패션잡화
      - "50000002"  # 화장품/미용

  # 예시 7: 인물 검색 트렌드
  - name: "인물 검색 트렌드"
    enabled: true
    description: "주요 인물 및 유명인 검색 트렌드"
    version: "2026.04"
    taxonomy:
      vertical: people
      intent: public_attention
    keywords:
      - "유명인"
      - "연예인"
      - "배우"
      - "가수"
      - "정치인"
      - "스포츠 선수"
      - "인플루언서"
      - "유튜버"
    channels:
      - naver
      - google
      - youtube
    time_range:
      start: "2024-01-01"
      end: "2026-12-31"
    filters:
      time_unit: date
      geo: KR
