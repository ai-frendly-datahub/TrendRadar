name: Daily Trend Collection

on:
  schedule:
    # 매일 오전 7시 (UTC 22:00 = KST 07:00+1)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 지원

concurrency:
  group: trendradar-daily-trends
  cancel-in-progress: false

jobs:
  collect-trends:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # GitHub Pages 배포 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Collect trends and generate reports
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          python main.py --mode once --generate-report

      - name: Generate index.html
        run: |
          python -c "from reporters.html_reporter import generate_index_html; from pathlib import Path; generate_index_html(Path('docs'))"

      - name: Run Quality Checks
        if: always()
        run: |
          python scripts/check_quality.py > quality_report.txt 2>&1 || true
          cat quality_report.txt >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Archive Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-${{ github.run_number }}
          path: quality_report.txt
          retention-days: 30

      - name: Upload DuckDB database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trendradar-db-${{ github.run_number }}
          path: data/trendradar.duckdb
          retention-days: 30

      - name: Deploy reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false  # 전체 docs 폴더 배포

      - name: Create summary
        run: |
          echo "## 📊 TrendRadar 수집 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 수집 날짜: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- 리포트: [GitHub Pages에서 확인](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/)" >> $GITHUB_STEP_SUMMARY

          if [ -f "docs/reports/spike_$(date +'%Y-%m-%d').html" ]; then
            echo "- ✅ 급상승 리포트 생성됨" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.NOTIFICATION_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repo": "${{ github.repository }}",
              "workflow": "${{ github.workflow }}",
              "run_id": "${{ github.run_id }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "status": "failure",
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }' || true
