name: Daily Trend Collection

on:
  schedule:
    # 매일 오전 9시 (UTC 0:00 = KST 9:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 지원

jobs:
  collect-trends:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # GitHub Pages 배포 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Collect trends and generate reports
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          python main.py --mode once --generate-report

      - name: Upload DuckDB database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trendradar-db-${{ github.run_number }}
          path: data/trendradar.duckdb
          retention-days: 90

      - name: Deploy reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false  # 전체 docs 폴더 배포

      - name: Create summary
        run: |
          echo "## 📊 TrendRadar 수집 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 수집 날짜: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- 리포트: [GitHub Pages에서 확인](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/)" >> $GITHUB_STEP_SUMMARY

          if [ -f "docs/reports/spike_$(date +'%Y-%m-%d').html" ]; then
            echo "- ✅ 급상승 리포트 생성됨" >> $GITHUB_STEP_SUMMARY
          fi
