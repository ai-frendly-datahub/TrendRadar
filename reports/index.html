<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendRadar 리포트 목록</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            min-width: 200px;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .report-list {
            margin-top: 30px;
        }
        .report-date {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .report-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .report-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .report-link:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .report-link.trend {
            border-left: 4px solid #4CAF50;
        }
        .report-link.spike {
            border-left: 4px solid #f5576c;
        }
        .icon {
            font-size: 1.2em;
        }
        .no-reports {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            color: #999;
            font-size: 0.9em;
        }
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
        }
        .github-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>🎯</span>
            <span>TrendRadar 리포트</span>
        </h1>

        <div class="subtitle">
            트렌드를 레이더처럼 계속 보여주는 도구 - 급상승 키워드 자동 감지
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">전체 리포트</div>
                <div class="stat-number">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">일일 트렌드</div>
                <div class="stat-number">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">급상승 분석</div>
                <div class="stat-number">0</div>
            </div>
        </div>

        <div class="report-list">

            <div class="no-reports">
                <h2>📭 아직 생성된 리포트가 없습니다</h2>
                <p>GitHub Actions 워크플로를 실행하여 첫 리포트를 생성하세요!</p>
            </div>

        </div>

        <div class="footer">
            <p>Generated by TrendRadar</p>
            <a href="https://github.com/zzragida/TrendRadar" class="github-link" target="_blank">
                <span>🔗</span>
                <span>GitHub Repository</span>
            </a>
        </div>
    </div>
</body>
</html>
